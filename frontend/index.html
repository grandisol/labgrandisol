<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📖</text></svg>" />
    
    <!-- PWA Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="LabGrandisol v2.1 - Sistema de Biblioteca Virtual com recursos avançados de gestão e pesquisa acadêmica." />
    <meta name="keywords" content="biblioteca, virtual, livros, leitura, SaaS, organização, análises, PWA, offline" />
    <meta name="author" content="LabGrandisol Team" />
    
    <!-- PWA Theme Colors -->
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />
    <meta name="background-color" content="#0f172a" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LabGrandisol" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LabGrandisol - Biblioteca Virtual" />
    <meta property="og:description" content="Sistema de Biblioteca Virtual com recursos avançados de gestão e pesquisa acadêmica." />
    <meta property="og:image" content="/screenshots/library.png" />
    <meta property="og:url" content="https://library.local" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LabGrandisol - Biblioteca Virtual" />
    <meta name="twitter:description" content="Sistema de Biblioteca Virtual com recursos avançados." />
    
    <title>LabGrandisol v2.1 - Biblioteca Virtual Inteligente</title>
    
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        font-family: 'Poppins', 'Crimson Text', Georgia, serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      #root { min-height: 100vh; }
      
      /* Loading Screen */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        gap: 24px;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      }
      
      .loading-logo {
        font-size: 48px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(99, 102, 241, 0.2);
        border-top: 4px solid #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      .loading-text {
        font-size: 18px;
        font-weight: 500;
        color: #94a3b8;
        letter-spacing: 0.5px;
      }
      
      .loading-version {
        font-size: 12px;
        color: #64748b;
        margin-top: 8px;
      }
      
      @keyframes spin { 
        to { transform: rotate(360deg); } 
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      /* Offline Indicator */
      .offline-indicator {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: linear-gradient(90deg, #ef4444, #dc2626);
        color: white;
        padding: 8px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        z-index: 9999;
        transform: translateY(-100%);
        transition: transform 0.3s ease;
      }
      
      .offline-indicator.show {
        transform: translateY(0);
      }
      
      /* Update Available Toast */
      .update-toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        z-index: 9999;
        transition: transform 0.3s ease;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .update-toast.show {
        transform: translateX(-50%) translateY(0);
      }
      
      .update-toast button {
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s;
      }
      
      .update-toast button:hover {
        background: rgba(255,255,255,0.3);
      }
    </style>
  </head>
  <body>
    <!-- Offline Indicator -->
    <div class="offline-indicator" id="offline-indicator">
      📡 Você está offline - Algumas funcionalidades podem não estar disponíveis
    </div>
    
    <!-- App Root -->
    <div id="root">
      <div class="app-loading">
        <div class="loading-logo">📖</div>
        <div class="loading-spinner"></div>
        <p class="loading-text">Carregando LabGrandisol...</p>
        <p class="loading-version">v2.1.0</p>
      </div>
    </div>
    
    <!-- Update Toast -->
    <div class="update-toast" id="update-toast">
      <span>🆕 Nova versão disponível!</span>
      <button onclick="updateApp()">Atualizar</button>
    </div>
    
    <!-- Main Script -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        let registration;
        
        window.addEventListener('load', async () => {
          try {
            registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            
            console.log('✅ Service Worker registered:', registration.scope);
            
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available
                  document.getElementById('update-toast').classList.add('show');
                }
              });
            });
            
          } catch (error) {
            console.error('❌ Service Worker registration failed:', error);
          }
        });
        
        // Handle updates
        window.updateApp = function() {
          if (registration && registration.waiting) {
            registration.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
          window.location.reload();
        };
        
        // Offline detection
        function updateOnlineStatus() {
          const indicator = document.getElementById('offline-indicator');
          if (!navigator.onLine) {
            indicator.classList.add('show');
          } else {
            indicator.classList.remove('show');
          }
        }
        
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();
        
        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }
      
      // PWA Install Prompt
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show install button after a delay
        setTimeout(() => {
          const installToast = document.createElement('div');
          installToast.className = 'update-toast show';
          installToast.innerHTML = `
            <span>📱 Instalar LabGrandisol como app?</span>
            <button onclick="installApp()">Instalar</button>
          `;
          document.body.appendChild(installToast);
          
          window.installApp = async function() {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              console.log('User choice:', outcome);
              deferredPrompt = null;
              installToast.remove();
            }
          };
        }, 5000);
      });
    </script>
  </body>
</html>
