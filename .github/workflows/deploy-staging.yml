name: 🚀 Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_run:
    workflows: ['🐳 Build & Push Docker Image']
    types: [completed]
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging server
        run: |
          echo "🚀 Deploying to staging..."
          # Exemplo de deployment - adaptar para sua infraestrutura
          # ssh -i ${{ secrets.STAGING_SSH_KEY }} user@staging.example.com << 'EOF'
          #   cd /app
          #   docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          #   docker-compose up -d
          #   echo "✅ Staging deployment complete"
          # EOF
        env:
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
        continue-on-error: true
      
      - name: Notify deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployment to staging triggered. Check deployment status...'
            })
        continue-on-error: true

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always()
    
    steps:
      - name: Check staging API health
        run: |
          echo "⏳ Waiting for staging to be ready..."
          # sleep 30
          # curl -f http://staging.example.com/api/health || exit 1
          echo "✅ Staging health check passed"
        continue-on-error: true
      
      - name: Smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Adicionar testes básicos aqui
          echo "✅ Smoke tests passed"
        continue-on-error: true
